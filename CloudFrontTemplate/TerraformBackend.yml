AWSTemplateFormatVersion: '2010-09-09'
Description: Template for Terraform Backend with OIDC GitHub Actions. Creates S3 and DynamoDB only if requested.

Parameters:
  UserName:
    Description: "User who triggered the creation (Struct8User Tag)."
    Type: String
    Default: "Struct8-user"

  # --- S3 CONFIGURATION ---
  CreateS3Bucket:
    Description: "Do you want to create the S3 bucket? (true/false)."
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]

  S3BucketName:
    Description: "Name of the S3 bucket (Required if CreateS3Bucket is true. Must be globally unique)."
    Type: String

  # --- DYNAMODB CONFIGURATION ---
  CreateDynamoDBTable:
    Description: "Do you want to create the DynamoDB table for State Locking? (true/false)."
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]

  DynamoDBTableName:
    Description: "Name of the DynamoDB table."
    Type: String
    Default: "terraform-state-lock"

  # --- GITHUB & OIDC CONFIGURATION ---
  CreateOIDCProvider:
    Description: "Creates the OIDC provider if it does not already exist in the account (true/false)."
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]

  IAMRoleName:
    Description: "Name of the IAM Role for GitHub Actions."
    Type: String
    Default: "github-actions-terraform-role"

  GitHubOrg:
    Description: "GitHub Organization/User."
    Type: String

  GitHubRepo:
    Description: "Authorized GitHub repository."
    Type: String

Conditions:
  ShouldCreateS3: !Equals [ !Ref CreateS3Bucket, "true" ]
  ShouldCreateDynamoDB: !Equals [ !Ref CreateDynamoDBTable, "true" ]
  ShouldCreateOIDC: !Equals [ !Ref CreateOIDCProvider, "true" ]

Resources:
  # 1. OIDC Provider (Optional)
  GithubOidc:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDC
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1 # Legacy thumbprint (still valid)
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd # New updated thumbprint

  # 2. S3 Bucket for Terraform State (Optional)
  TerraformStateBucket:
    Type: AWS::S3::Bucket
    Condition: ShouldCreateS3
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Ref S3BucketName
        - Key: Struct8User
          Value: !Ref UserName
        - Key: State
          Value: !Ref "AWS::StackName"

  # 3. DynamoDB Table for State Locking (Optional)
  TerraformStateLockTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldCreateDynamoDB
    Properties:
      TableName: !Ref DynamoDBTableName
      AttributeDefinitions:
        - AttributeName: LockID
          AttributeType: S
      KeySchema:
        - AttributeName: LockID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Name
          Value: !Ref DynamoDBTableName
        - Key: Struct8User
          Value: !Ref UserName
        - Key: State
          Value: !Ref "AWS::StackName"

  # 4. IAM Role for GitHub Actions (Always created)
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref IAMRoleName
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              # Fixes Race Condition: Creates implicit dependency only if OIDC is created in the Stack
              Federated: !If 
                - ShouldCreateOIDC
                - !Ref GithubOidc
                - !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: "sts:AssumeRoleWithWebIdentity"
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
              StringEquals:
                token.actions.githubusercontent.com:aud: "sts.amazonaws.com"
      Tags:
        - Key: Name
          Value: !Ref IAMRoleName
        - Key: Struct8User
          Value: !Ref UserName
        - Key: State
          Value: !Ref "AWS::StackName"

Outputs:
  RoleArn:
    Description: "ARN of the Role to use in GitHub Actions"
    Value: !GetAtt GitHubActionsRole.Arn
  
  BucketName:
    Condition: ShouldCreateS3
    Description: "Name of the created S3 Bucket"
    Value: !Ref TerraformStateBucket

  DynamoDBTable:
    Condition: ShouldCreateDynamoDB
    Description: "Name of the created DynamoDB table"
    Value: !Ref TerraformStateLockTable
