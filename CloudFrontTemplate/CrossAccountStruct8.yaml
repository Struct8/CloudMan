
AWSTemplateFormatVersion: "2010-09-09"
Description: "Struct8 Connection: Creates a Cross-Account IAM Role with ReadOnly Access."

Parameters:
  ExternalID:
    Type: String
    Description: "Unique secret generated by Struct8 to secure this connection."
    NoEcho: true

  Struct8AccountID:
    Type: String
    Description: "The AWS Account ID of the Struct8 SaaS platform."
    AllowedPattern: '\d{12}'
    ConstraintDescription: "Must be a 12-digit AWS Account ID."

Resources:
  Struct8CrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "CrossAccountStruct8"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${Struct8AccountID}:root"
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                "sts:ExternalId": !Ref ExternalID
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/ReadOnlyAccess"

Outputs:
  RoleArn:
    Description: "The ARN of the newly created connection role."
    Value: !GetAtt Struct8CrossAccountRole.Arn
