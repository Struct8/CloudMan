<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppSync WebSocket Test</title>
  <!-- Tailwind CSS para um design limpo e moderno -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col justify-between">

  <div class="container mx-auto px-4 py-8 max-w-2xl">
    <!-- Cabeçalho -->
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-gray-800">AppSync WebSocket Test</h1>
      <p class="text-gray-600 mt-2">Teste de recepção de dados em tempo real</p>
    </header>

    <!-- Formulário de Configuração -->
    <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-6">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">Configuração da Conexão</h2>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1" for="graphqlUrl">GraphQL URL</label>
          <input type="text" id="graphqlUrl" placeholder="https://xxxxxx.appsync-api.us-east-1.amazonaws.com/graphql" 
                 class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1" for="apiKey">API Key</label>
          <input type="password" id="apiKey" placeholder="da2-xxxxxxxxxxxxxxxxxxxxxxxx" 
                 class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm">
        </div>

        <button id="btnConnect" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-md shadow-sm transition duration-150 text-sm">
          Conectar ao WebSocket
        </button>
      </div>
    </section>

    <!-- Status de Conexão -->
    <div class="flex items-center justify-between bg-white px-6 py-4 rounded-lg shadow-sm border border-gray-200 mb-6">
      <span class="text-sm font-medium text-gray-600">Status da conexão:</span>
      <div class="flex items-center space-x-2">
        <span id="statusIndicator" class="h-3.0 w-3 h-3 rounded-full bg-red-500"></span>
        <span id="statusText" class="text-sm font-semibold text-red-600">Desconectado</span>
      </div>
    </div>

    <!-- Lista de Mensagens Recebidas -->
    <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-gray-700">Mensagens Recebidas</h2>
        <button id="btnClear" class="text-xs text-gray-500 hover:text-gray-700">Limpar lista</button>
      </div>
      
      <div id="messagesContainer" class="space-y-3 max-h-80 overflow-y-auto pr-2">
        <p id="noMessages" class="text-sm text-gray-400 text-center py-8">Nenhuma mensagem recebida ainda.</p>
      </div>
    </section>
  </div>

  <footer class="text-center py-4 text-xs text-gray-400 border-t border-gray-100 bg-white">
    AWS AppSync WebSocket Client Test
  </footer>

  <!-- Carregando AWS Amplify através de um CDN ESM compatível com navegadores modernos -->
  <script type="module">
    import { Amplify, API, graphqlOperation } from 'https://esm.sh/aws-amplify@5.3.12';

    const btnConnect = document.getElementById('btnConnect');
    const btnClear = document.getElementById('btnClear');
    const statusIndicator = document.getElementById('statusIndicator');
    const statusText = document.getElementById('statusText');
    const messagesContainer = document.getElementById('messagesContainer');
    const noMessages = document.getElementById('noMessages');

    let activeSubscription = null;

    // Função para atualizar o status visual na interface
    function updateStatus(status) {
      if (status === 'connected') {
        statusIndicator.className = 'h-3 w-3 rounded-full bg-green-500';
        statusText.innerText = 'Conectado (Ouvindo Mutation)';
        statusText.className = 'text-sm font-semibold text-green-600';
        btnConnect.innerText = 'Desconectar';
        btnConnect.className = 'w-full bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded-md shadow-sm transition duration-150 text-sm';
      } else if (status === 'connecting') {
        statusIndicator.className = 'h-3 w-3 rounded-full bg-yellow-500';
        statusText.innerText = 'Conectando...';
        statusText.className = 'text-sm font-semibold text-yellow-600';
        btnConnect.disabled = true;
      } else {
        statusIndicator.className = 'h-3 w-3 rounded-full bg-red-500';
        statusText.innerText = 'Desconectado';
        statusText.className = 'text-sm font-semibold text-red-600';
        btnConnect.innerText = 'Conectar ao WebSocket';
        btnConnect.disabled = false;
        btnConnect.className = 'w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-md shadow-sm transition duration-150 text-sm';
      }
    }

    // Função para renderizar uma nova mensagem recebida na tela
    function appendMessage(content) {
      if (noMessages) {
        noMessages.style.display = 'none';
      }

      const time = new Date().toLocaleTimeString();
      const messageDiv = document.createElement('div');
      messageDiv.className = 'bg-gray-50 border border-gray-100 rounded-lg p-3 text-sm flex justify-between items-start shadow-sm transition duration-300 ease-in-out transform translate-y-1 animate-fade-in';
      
      messageDiv.innerHTML = `
        <span class="text-gray-800 font-medium">${content}</span>
        <span class="text-xs text-gray-400 whitespace-nowrap ml-4">${time}</span>
      `;
      
      messagesContainer.prepend(messageDiv);
    }

    // Gerenciador de conexão
    function toggleConnection() {
      if (activeSubscription) {
        // Desconectar
        activeSubscription.unsubscribe();
        activeSubscription = null;
        updateStatus('disconnected');
        return;
      }

      const graphqlUrl = document.getElementById('graphqlUrl').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();

      if (!graphqlUrl || !apiKey) {
        alert('Por favor, preencha o campo GraphQL URL e a API Key antes de conectar.');
        return;
      }

      updateStatus('connecting');

      try {
        // Configura o cliente do Amplify
        Amplify.configure({
          aws_appsync_graphqlEndpoint: graphqlUrl,
          aws_appsync_region: 'us-east-1', // Certifique-se de usar a mesma região do Terraform
          aws_appsync_authenticationType: 'API_KEY',
          aws_appsync_apiKey: apiKey
        });

        // Query de Subscription idêntica à declarada no Schema do AppSync
        const subscriptionQuery = `
          subscription OnPublishMessage {
            onPublishMessage {
              id
              content
            }
          }
        `;

        // Inicia a escuta da Subscription
        activeSubscription = API.graphql(
          graphqlOperation(subscriptionQuery)
        ).subscribe({
          next: ({ value }) => {
            const data = value.data.onPublishMessage;
            appendMessage(data.content);
          },
          error: (err) => {
            console.error('Erro na subscription:', err);
            alert('Falha ao conectar no WebSocket do AppSync. Verifique o console e os parâmetros fornecidos.');
            updateStatus('disconnected');
            activeSubscription = null;
          }
        });

        // Pequeno atraso para atualizar o status visual após iniciar a conexão
        setTimeout(() => {
          if (activeSubscription) {
            updateStatus('connected');
          }
        }, 1500);

      } catch (error) {
        console.error('Erro de configuração:', error);
        updateStatus('disconnected');
      }
    }

    // Eventos dos botões
    btnConnect.addEventListener('click', toggleConnection);
    
    btnClear.addEventListener('click', () => {
      messagesContainer.innerHTML = '';
      messagesContainer.appendChild(noMessages);
      noMessages.style.display = 'block';
    });
  </script>
</body>
</html>
